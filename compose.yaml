services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptobot-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      TZ: Asia/Tokyo
      CRYPTOBOT_DATABASE_URL: postgres://cryptobot:cryptobot@postgres:5432/cryptobot?sslmode=disable
      CRYPTOBOT_HTTP_ADDR: :8080
    ports:
      - "8080:8080"

  postgres:
    image: postgres:17-alpine
    container_name: cryptobot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptobot
      POSTGRES_USER: cryptobot
      POSTGRES_PASSWORD: cryptobot
      TZ: Asia/Tokyo
      PGTZ: Asia/Tokyo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptobot -d cryptobot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres-data:
